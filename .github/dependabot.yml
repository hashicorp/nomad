version: 2
updates:
  - package-ecosystem: gomod
    directory: "/"
    labels:
      - "theme/dependencies"
    groups:
      go-updates:
        patterns:
          - "*"
        applies-to: "version-updates"
        schedule:
          interval: "cron"
          cronjob: "0 9 15 * *" # once a month, mid-month
      go-security:
        patterns:
          - "*"
        applies-to: "security-updates"
        schedule:
          interval: "weekly"
          day: "sunday"
          time: "09:00"

  - package-ecosystem: gomod
    directory: "/api"
    labels:
      - "theme/dependencies"
      - "theme/api"
    groups:
      go-updates-api:
        patterns:
          - "*"
        applies-to: "version-updates"
        schedule:
          interval: "cron"
          cronjob: "0 9 15 * *" # once a month, mid-month
      go-security-api:
        patterns:
          - "*"
        applies-to: "security-updates"
        schedule:
          interval: "weekly"
          day: "sunday"
          time: "09:00"

  - package-ecosystem: npm
    directory: "/ui"
    labels:
      - "theme/dependencies"
      - "theme/ui"
    groups:
      ui-dev:
        schedule:
          interval: "cron"
          cronjob: "0 9 15 * *" # once a month, mid-month
         patterns:
           - "*"
         dependency-type: "development"
      ui-prod:
        schedule:
          interval: "cron"
          cronjob: "0 9 15 * *" # once a month, mid-month
         patterns:
           - "*"
         dependency-type: "production"
      ui-security:
        schedule:
          interval: "weekly"
          day: "sunday"
          time: "09:00"
        patterns:
          - "*"
        applies-to: "security-updates"
        dependency-type: "production"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "cron"
      cronjob: "0 9 15 * *" # once a month, mid-month
    labels:
      - "theme/dependencies"
      - "theme/build-infrastructure"
    groups:
      actions:
        patterns:
          - "*"
