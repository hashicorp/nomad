rules:
  # Check potentially RPC endpoints with missing authentication/authorization.
  - id: "rpc-potentially-unauthenticated"
    patterns:
      - pattern: |
          if done, err := $A.$B.forward($METHOD, ...); done {
            return err
          }
      # Pattern used by typical endpoints that take an auth token or workload
      # identity. Some of these endpoints have no context for Authenticate.
      - pattern-not-inside: |
          authErr := $A.$B.Authenticate(...)
          ...
          if done, err := $A.$B.forward($METHOD, ...); done {
            return err
          }
          ...
          ... := $A.$B.ResolveACL(...)
          ...

      # Pattern used by endpoints that are used only for server-to-server. The
      # authentication and authorization check must be done together before
      # forwarding to prevent the risk of confused deputy when RPCs are
      # forwarded.
      - pattern-not-inside: |
          aclObj, err := $A.srv.AuthenticateServerOnly($A.ctx, args)
          ...
          if err != nil || !aclObj.AllowServerOp() {
            return structs.ErrPermissionDenied
          }
          ...
          if done, err := $A.srv.forward($METHOD, ...); done {
            return err
          }
          ...

      # Pattern used by endpoints that are used only for client-to-server and
      # authorize using client ACLs.
      - pattern-not-inside: |
          aclObj, err := $A.$B.AuthenticateClientOnly($A.ctx, args)
          ...
          if err != nil {
            return structs.ErrPermissionDenied
          }
          ...
          if done, err := $A.$B.forward($METHOD, ...); done {
            return err
          }
          ...
          if !aclObj.AllowClientOp(...) {
            return structs.ErrPermissionDenied
          }
          ...

      - pattern-not-inside: |
          aclObj, err := $A.$B.AuthenticateClientOnly($A.ctx, args)
          ...
          if err != nil {
            return structs.ErrPermissionDenied
          }
          ...
          if done, err := $A.$B.forward($METHOD, ...); done {
            return err
          }
          ...
          if ... || !aclObj.AllowClientOp(...) {
            return structs.ErrPermissionDenied
          }
          ...

      # Pattern used by endpoints that are used only for client-to-server and
      # authorize using client ACLs plus a same-node identity check.
      - pattern-not-inside: |
          aclObj, err := $A.$B.AuthenticateClientOnly($A.ctx, args)
          ...
          if done, err := $A.$B.forward($METHOD, ...); done {
            return err
          }
          ...
          if err != nil {
            return structs.ErrPermissionDenied
          }
          ...
          if !aclObj.AllowClientOp(...) {
            return structs.ErrPermissionDenied
          }
          ...
          if authenticatedNodeID(args.GetIdentity()) != ... {
            return structs.ErrPermissionDenied
          }
          ...

      # Pattern used by endpoints that are used only for client-to-server and
      # authorize using client ACLs plus a same-node identity check.
      - pattern-not-inside: |
          aclObj, err := $A.$B.AuthenticateClientOnly($A.ctx, args)
          ...
          if done, err := $A.$B.forward($METHOD, ...); done {
            return err
          }
          ...
          if err != nil {
            return structs.ErrPermissionDenied
          }
          ...
          if callerNodeID == "" {
            return structs.ErrPermissionDenied
          }
          ...
          if node == nil || !aclObj.AllowClientOp(node.NodePool) {
            return structs.ErrPermissionDenied
          }
          ...
          if nodeID != callerNodeID {
            return structs.ErrPermissionDenied
          }
          ...

      # Pattern used by endpoints that are used only for client-to-server and
      # authorize using client ACLs plus a same-node identity check after
      # loading the target node from state.
      - pattern-not-inside: |
          aclObj, err := $A.$B.AuthenticateClientOnly($A.ctx, args)
          ...
          if done, err := $A.$B.forward($METHOD, ...); done {
            return err
          }
          ...
          if err != nil {
            return structs.ErrPermissionDenied
          }
          ...
          node, err := $A.$B.State().NodeByID(nil, ...)
          ...
          if !aclObj.AllowClientOp(node.NodePool) {
            return structs.ErrPermissionDenied
          }
          ...
          if err := auth.AuthorizeSameNode(args.GetIdentity(), ...); err != nil {
            return err
          }
          ...

      # Pattern used by endpoints that are used only for client-to-server and
      # authorize allocations using a helper from the auth package.
      - pattern-not-inside: |
          aclObj, err := $A.$B.AuthenticateClientOnly($A.ctx, args)
          ...
          if done, err := $A.$B.forward($METHOD, ...); done {
            return err
          }
          ...
          if err != nil {
            return structs.ErrPermissionDenied
          }
          ...
          if err := $A.$B.AuthorizeClientAllocation(aclObj, ..., ...); err != nil {
            return err
          }
          ...

      # Pattern used by endpoints that are used only for client-to-server and
      # authorize node-pool scoped access through auth helpers.
      - pattern-not-inside: |
          aclObj, err := $A.$B.AuthenticateClientOnly($A.ctx, args)
          ...
          if done, err := $A.$B.forward($METHOD, ...); done {
            return err
          }
          ...
          if err != nil {
            return structs.ErrPermissionDenied
          }
          ...
          if _, err := $A.$B.ResolveAuthorizedClientNodePoolByNodeID(aclObj, ...); err != nil {
            return err
          }
          ...

      - pattern-not-inside: |
          aclObj, err := $A.$B.AuthenticateClientOnly($A.ctx, args)
          ...
          if done, err := $A.$B.forward($METHOD, ...); done {
            return err
          }
          ...
          if err != nil {
            return structs.ErrPermissionDenied
          }
          ...
          if _, err := $A.$B.ResolveAuthorizedClientNodePoolByServiceRegistrationID(aclObj, ..., ...); err != nil {
            return err
          }
          ...

      # Pattern used by endpoints that are used only for client-to-server and
      # authorize same-node service registration upserts through auth helpers.
      - pattern-not-inside: |
          ..., err := $A.$B.AuthenticateClientOnly($A.ctx, args)
          ...
          if done, err := $A.$B.forward($METHOD, ...); done {
            return err
          }
          ...
          if err != nil {
            return structs.ErrPermissionDenied
          }
          ...
          if err := auth.AuthorizeSameNodeServiceRegistrations(args.GetIdentity(), args.Services); err != nil {
            return err
          }
          ...

      # Pattern used by CSI endpoints that perform their own client/server or
      # namespace-based authorization after forwarding.
      - pattern-not-inside: |
          authErr := $A.$B.Authenticate($A.ctx, args)
          ...
          if done, err := $A.$B.forward($METHOD, ...); done {
            return err
          }
          ...
          aclObj, err := $A.$B.ResolveACL(args)
          ...
          if err := $A.authorizeClaim(aclObj, args); err != nil {
            return err
          }
          ...

      # Pattern used by CSI endpoints that perform their own client/server or
      # namespace-based authorization after forwarding.
      - pattern-not-inside: |
          authErr := $A.$B.Authenticate($A.ctx, args)
          ...
          if done, err := $A.$B.forward($METHOD, ...); done {
            return err
          }
          ...
          allowVolume := acl.NamespaceValidator(...)
          ...
          aclObj, err := $A.$B.ResolveACL(args)
          ...
          if err := $A.authorizeUnpublish(aclObj, args, allowVolume); err != nil {
            return err
          }
          ...

      # Pattern used by ACL endpoints that need to interact with the token
      # directly.
      - pattern-not-inside: |
          authErr := $A.$B.Authenticate($A.ctx, args)
          ...
          if done, err := $A.$B.forward($METHOD, ...); done {
            return err
          }
          ...
          ... := args.GetIdentity().GetACLToken()
          ...

      - metavariable-pattern:
          metavariable: $METHOD
          patterns:
            # Endpoints that are expected not to have authentication.
            - pattern-not: '"ACL.Bootstrap"'
            - pattern-not: '"ACL.GetClaimPolicies"'
            - pattern-not: '"ACL.ResolveToken"'
            - pattern-not: '"ACL.UpsertOneTimeToken"'
            - pattern-not: '"ACL.ExchangeOneTimeToken"'
            - pattern-not: '"ACL.WhoAmI"'
            - pattern-not: "structs.ACLListAuthMethodsRPCMethod"
            - pattern-not: "structs.ACLOIDCAuthURLRPCMethod"
            - pattern-not: "structs.ACLOIDCCompleteAuthRPCMethod"
            - pattern-not: "structs.ACLLoginRPCMethod"
            - pattern-not: '"Status.Leader"'
            - pattern-not: '"Status.Peers"'
            - pattern-not: '"Status.Version"'
            - pattern-not: '"Keyring.ListPublic"'
            - pattern-not: '"Keyring.GetConfig"'
    message: "RPC method $METHOD appears to be unauthenticated"
    languages:
      - "go"
    severity: "WARNING"
    paths:
      include:
        - "**/nomad/*_endpoint.go"

  # ACL objects should never be nil-checked in RPC handlers before checking
  # authorization, as nil ACLs are always programmer errors.
  - id: "rpc-authz-bypass"
    patterns:
      # Pattern that may accidentally bypass authorization checks.
      - pattern: |
          aclObj == nil

    message: "RPC method ACL check appears to bypass authorization by first checking for nil ACLs"
    languages:
      - "go"
    severity: "WARNING"
    paths:
      include:
        - "**/nomad/*_endpoint.go"
